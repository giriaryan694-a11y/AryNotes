<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AryNotes — Engagement Notebook</title>
<style>
  :root{
    --bg:#0d1117; --panel:#141b24; --panel-2:#0f1620; --border:#232d3a;
    --text:#dbe2ea; --text-dim:#8492a6; --accent:#e0a458; --accent-2:#3fa796;
    --danger:#d9534f; --radius:6px; --mono:'IBM Plex Mono', 'Courier New', monospace;
    --sans:'IBM Plex Sans', Arial, sans-serif;
  }
  [data-theme="light"]{
    --bg:#f2efe9; --panel:#ffffff; --panel-2:#eae6dd;
    --border:#d8d2c4; --text:#232019; --text-dim:#71695a;
    --accent:#b5762d; --accent-2:#1f7a6c; --danger:#b23b37;
  }
  [data-theme="eyesaver"]{
    --bg:#fbf3d9; --panel:#fdf6df; --panel-2:#f3e8c4;
    --border:#e3d6a4; --text:#3b3220; --text-dim:#7a6c47;
    --accent:#8a5a2b; --accent-2:#4f7a52; --danger:#a5433c;
  }

  *{box-sizing:border-box;}
  body{
    margin:0; height:100vh; overflow:hidden;
    font-family:var(--sans); background:var(--bg); color:var(--text);
    display:flex; flex-direction:column;
    transition:background .2s, color .2s;
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; background:var(--panel); border-bottom:1px solid var(--border);
    flex-shrink:0; flex-wrap:wrap; gap:8px; position:relative; z-index:20;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .mark{
    font-family:var(--mono); font-weight:700; font-size:13px; letter-spacing:.08em;
    background:var(--accent); color:var(--panel); padding:4px 8px; border-radius:4px;
  }
  .brand h1{font-size:16px; margin:0; font-weight:600;}
  .brand .sub{font-family:var(--mono); font-size:11px; color:var(--text-dim);}

  .hdr-actions{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .seg-group{display:flex; gap:3px; background:var(--panel-2); border:1px solid var(--border); border-radius:6px; padding:2px;}
  .seg-btn{
    border:none; background:transparent; color:var(--text-dim); cursor:pointer;
    padding:5px 9px; border-radius:4px; font-size:12px; font-family:var(--mono);
  }
  .seg-btn.active{background:var(--accent); color:var(--panel); font-weight:600;}

  button{
    font-family:var(--sans); cursor:pointer; border:1px solid var(--border);
    background:var(--panel-2); color:var(--text); border-radius:5px;
    padding:7px 11px; font-size:13px; transition:.15s;
  }
  button:hover{border-color:var(--accent); color:var(--accent);}
  button.primary{background:var(--accent); color:var(--panel); border-color:var(--accent); font-weight:600;}
  button.primary:hover{opacity:.88; color:var(--panel);}
  button.ghost-danger:hover{border-color:var(--danger); color:var(--danger);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  input[type=file]{display:none;}

  /* ---- Mode picker ---- */
  .mode-picker{position:relative;}
  .mode-trigger{
    display:flex; align-items:center; gap:6px; font-family:var(--mono); font-size:12.5px;
    background:var(--panel-2); border:1px solid var(--border);
  }
  .mode-trigger .dot{width:8px; height:8px; border-radius:50%; background:var(--accent-2);}
  .mode-trigger .chev{font-size:10px; color:var(--text-dim);}
  .mode-panel{
    display:none; position:absolute; top:calc(100% + 6px); right:0; width:300px;
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.35); z-index:50; overflow:hidden;
  }
  .mode-panel.open{display:block;}
  .mode-panel-header{
    padding:10px 12px; font-family:var(--mono); font-size:10.5px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--text-dim); border-bottom:1px solid var(--border);
  }
  .mode-list{max-height:260px; overflow-y:auto;}
  .mode-option{
    display:flex; align-items:center; gap:9px; padding:9px 12px; cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .mode-option:last-child{border-bottom:none;}
  .mode-option:hover{background:var(--panel-2);}
  .mode-option.active{background:var(--panel-2);}
  .mode-option .m-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .mode-option .m-info{flex:1; min-width:0;}
  .mode-option .m-name{font-size:13px; font-weight:600;}
  .mode-option .m-name.active-check::after{content:" ✓"; color:var(--accent-2);}
  .mode-option .m-blurb{font-size:10.5px; color:var(--text-dim); margin-top:1px; line-height:1.3;}
  .mode-option .m-del{
    border:none; background:transparent; color:var(--text-dim); font-size:12px; padding:2px 4px; flex-shrink:0;
  }
  .mode-option .m-del:hover{color:var(--danger);}
  .mode-panel-footer{
    display:flex; flex-direction:column; gap:5px; padding:10px 12px; border-top:1px solid var(--border);
    background:var(--panel-2);
  }
  .mode-panel-footer button{width:100%; text-align:left; font-size:12.5px;}

  .layout{flex:1; display:flex; min-height:0;}

  /* ---- Sidebar: folders ---- */
  .sidebar{
    width:230px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:14px 10px;
  }
  .sidebar-title{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em;
    color:var(--text-dim); padding:0 6px 8px; display:flex; justify-content:space-between; align-items:center;
  }
  .sidebar-title button{padding:2px 7px; font-size:14px; line-height:1;}
  .mode-hint{
    font-family:var(--mono); font-size:10.5px; color:var(--text-dim); padding:0 6px 10px; line-height:1.4;
  }
  .folder-list{overflow-y:auto; flex:1;}
  .folder-item{
    display:flex; align-items:center; gap:8px; padding:8px 8px; margin:2px 0;
    border-radius:5px; cursor:pointer; font-size:13px; color:var(--text);
    border:1px solid transparent;
  }
  .folder-item:hover{background:var(--panel-2);}
  .folder-item.active{background:var(--panel-2); border-color:var(--border); font-weight:600;}
  .folder-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .folder-name{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .folder-tag{font-family:var(--mono); font-size:9px; color:var(--text-dim); border:1px solid var(--border); border-radius:3px; padding:0 4px;}
  .folder-count{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
  .folder-item .del-folder{
    display:none; border:none; background:transparent; color:var(--text-dim);
    padding:0 2px; font-size:12px;
  }
  .folder-item:hover .del-folder{display:inline;}
  .folder-item .del-folder:hover{color:var(--danger);}

  .sidebar-footer{padding-top:10px; border-top:1px solid var(--border); margin-top:8px; display:flex; flex-direction:column; gap:6px;}
  .sidebar-footer button{width:100%; text-align:left;}

  /* ---- Notes list ---- */
  .notes-col{
    width:270px; flex-shrink:0; background:var(--panel-2); border-right:1px solid var(--border);
    display:flex; flex-direction:column;
  }
  .notes-col-header{padding:12px; border-bottom:1px solid var(--border);}
  .search-box{
    width:100%; padding:7px 9px; border-radius:5px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); font-size:13px; font-family:var(--sans);
  }
  .notes-scroll{flex:1; overflow-y:auto; padding:8px;}
  .note-card{
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--accent-2);
    border-radius:5px; padding:10px; margin-bottom:8px; cursor:pointer; position:relative;
  }
  .note-card:hover{border-color:var(--accent);}
  .note-card.active{outline:2px solid var(--accent); outline-offset:-1px;}
  .note-card .n-title{font-weight:600; font-size:13.5px; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .note-card .n-meta{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); display:flex; justify-content:space-between;}
  .note-card .n-preview{font-size:12px; color:var(--text-dim); margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .empty-hint{color:var(--text-dim); font-size:12.5px; text-align:center; padding:30px 12px; line-height:1.5;}

  /* ---- Editor ---- */
  .editor{flex:1; display:flex; flex-direction:column; min-width:0;}
  .editor-toolbar{
    display:flex; align-items:center; gap:8px; padding:10px 16px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; background:var(--panel);
  }
  .editor-toolbar .spacer{flex:1;}
  select{
    padding:6px 8px; border-radius:5px; border:1px solid var(--border);
    background:var(--panel-2); color:var(--text); font-size:12.5px; font-family:var(--mono);
    max-width:220px;
  }
  .editor-body{flex:1; display:flex; flex-direction:column; padding:16px; gap:10px; overflow-y:auto; min-height:0;}
  input#title{
    font-size:19px; font-weight:700; padding:8px 4px; border:none; border-bottom:2px solid var(--border);
    background:transparent; color:var(--text); font-family:var(--sans);
  }
  input#title:focus{outline:none; border-color:var(--accent);}
  input#tags{
    font-family:var(--mono); font-size:12px; padding:6px 8px; border:1px solid var(--border);
    border-radius:5px; background:var(--panel-2); color:var(--accent-2);
  }
  .write-tabs{display:flex; gap:6px;}
  .write-tabs button{padding:4px 10px; font-size:11.5px; font-family:var(--mono);}
  .write-tabs button.active{background:var(--accent); color:var(--panel); border-color:var(--accent);}

  .content-area{flex:1; position:relative; min-height:0;}
  .editor-pane{
    display:flex; width:100%; height:100%; border:1px solid var(--border); border-radius:6px;
    background:var(--panel); overflow:hidden;
  }
  .editor-pane:focus-within{border-color:var(--accent);}
  .line-gutter{
    flex-shrink:0; width:44px; padding:12px 8px 12px 0; text-align:right; overflow:hidden;
    font-family:var(--mono); font-size:14.5px; line-height:1.55; color:var(--text-dim);
    background:var(--panel-2); border-right:1px solid var(--border); user-select:none;
  }
  .line-gutter div{white-space:pre;}
  textarea#note{
    flex:1; width:100%; height:100%; padding:12px; font-size:14.5px; line-height:1.55; border:none;
    background:var(--panel); color:var(--text); resize:none; font-family:var(--mono);
    white-space:pre; overflow-wrap:normal; overflow-x:auto;
  }
  textarea#note:focus{outline:none;}
  .editor-pane.dragging{border-color:var(--accent-2); border-style:dashed;}
  .drop-hint{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(63,167,150,0.08); border:2px dashed var(--accent-2); border-radius:6px;
    color:var(--accent-2); font-family:var(--mono); font-size:13px; pointer-events:none;
  }
  .drop-hint.show{display:flex;}

  .preview-pane{
    display:none; width:100%; height:100%; border:1px solid var(--border); border-radius:6px;
    background:var(--panel); overflow:hidden;
  }
  .preview-pane.show{display:flex;}
  .preview-gutter{
    flex-shrink:0; width:44px; padding:14px 8px 14px 0; text-align:right; overflow:hidden;
    font-family:var(--mono); font-size:12.5px; line-height:1.6; color:var(--text-dim);
    background:var(--panel-2); border-right:1px solid var(--border); user-select:none;
  }
  .preview-gutter div{white-space:pre;}
  #preview{
    flex:1; overflow-y:auto; padding:14px; font-size:14px; line-height:1.6;
  }
  #preview img{max-width:100%; border-radius:5px; margin:6px 0; border:1px solid var(--border); display:block;}
  #preview code{background:var(--panel-2); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:.92em;}
  #preview p{margin:0 0 10px;}

  .meta-line{font-family:var(--mono); font-size:11px; color:var(--text-dim);}

  footer{
    padding:6px 16px; text-align:right; font-size:11px; color:var(--text-dim);
    background:var(--panel); border-top:1px solid var(--border); font-family:var(--mono);
  }

  ::-webkit-scrollbar{width:9px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:5px;}

  @media (max-width:900px){
    .sidebar{width:170px;}
    .notes-col{width:220px;}
    .mode-panel{width:260px; right:-40px;}
  }
</style>
</head>
<body data-theme="dark">

<header>
  <div class="brand">
    <span class="mark">AN</span>
    <div>
      <h1>AryNotes</h1>
      <div class="sub">engagement notebook — local &amp; offline</div>
    </div>
  </div>
  <div class="hdr-actions">

    <div class="mode-picker">
      <button class="mode-trigger" id="modeTrigger">
        <span class="dot" id="modeTriggerDot"></span>
        <span id="modeTriggerLabel">Mode</span>
        <span class="chev">▾</span>
      </button>
      <div class="mode-panel" id="modePanel">
        <div class="mode-panel-header">Select a mode</div>
        <div class="mode-list" id="modeList"></div>
        <div class="mode-panel-footer">
          <button id="createModeBtn">＋ Create custom mode</button>
          <button id="importModeBtn">⇧ Import mode</button>
          <button id="exportModeBtn">⇩ Export current mode</button>
        </div>
      </div>
    </div>

    <div class="seg-group theme-group">
      <button class="seg-btn" data-theme-btn="dark">Dark</button>
      <button class="seg-btn" data-theme-btn="light">Light</button>
      <button class="seg-btn" data-theme-btn="eyesaver">Eye-saver</button>
    </div>
    <button id="importBtn">⇧ Import notes</button>
    <button id="exportAllBtn">⇩ Export all</button>
    <input type="file" id="fileInput" accept=".txt,.json,.md" multiple>
    <input type="file" id="modeFileInput" accept=".json">
  </div>
</header>

<div class="layout">

  <!-- Folders -->
  <aside class="sidebar">
    <div class="sidebar-title">
      <span>Folders</span>
      <button id="addFolderBtn" title="New folder">＋</button>
    </div>
    <div class="mode-hint" id="modeHint"></div>
    <div class="folder-list" id="folderList"></div>
    <div class="sidebar-footer">
      <button id="allNotesBtn">≡ All Notes</button>
    </div>
  </aside>

  <!-- Notes list -->
  <section class="notes-col">
    <div class="notes-col-header">
      <input class="search-box" id="searchBox" placeholder="Search notes…" type="text">
    </div>
    <div class="notes-scroll" id="notesScroll"></div>
  </section>

  <!-- Editor -->
  <main class="editor" id="editorWrap">
    <div class="editor-toolbar">
      <select id="folderSelect"></select>
      <span class="spacer"></span>
      <div class="write-tabs">
        <button id="writeTab" class="active">Write</button>
        <button id="previewTab">Preview</button>
      </div>
      <button class="primary" id="saveBtn">💾 Save</button>
      <button id="downloadBtn">⬇ .txt</button>
      <button id="newBtn">＋ New</button>
      <button class="ghost-danger" id="deleteBtn">🗑 Delete</button>
    </div>
    <div class="editor-body">
      <input type="text" id="title" placeholder="Untitled note">
      <input type="text" id="tags" placeholder="tags: recon, smb, critical (comma separated)">
      <div class="content-area">
        <div class="editor-pane" id="editorPane">
          <div class="line-gutter" id="lineGutter"><div>1</div></div>
          <textarea id="note" placeholder="Findings, commands, output, evidence notes… drag & drop images here." spellcheck="false"></textarea>
        </div>
        <div class="drop-hint" id="dropHint">drop image to embed — ![name](inline)</div>
        <div class="preview-pane" id="previewPane">
          <div class="preview-gutter" id="previewGutter"><div>1</div></div>
          <div id="preview"></div>
        </div>
      </div>
      <div class="meta-line" id="metaLine"></div>
    </div>
  </main>

</div>

<footer>AryNotes · notes stored only in this browser · Made by Aryan Giri</footer>

<script>
(function(){
  const STORAGE_KEY = 'arynotes_v4';
  const LEGACY_KEY  = 'arynotes_v3';
  const THEME_KEY   = 'arynotes_theme';
  const COLOR_PALETTE = ['#3fa796','#4c8bf5','#e0a458','#d9534f','#a86ee0','#5cc98b','#e0c458','#8492a6'];

  const BUILT_IN_MODES = [
    { id:'freedom', name:'Freedom Mode', builtIn:true,
      blurb:'Blank slate — build your own folders for study, journaling, or general notes.',
      folders: [] },
    { id:'pentest', name:'Pentest Mode', builtIn:true,
      blurb:'Standard folders for authorized penetration test engagements.',
      folders: [
        {name:'Reconnaissance', color:'#3fa796'},
        {name:'Enumeration', color:'#4c8bf5'},
        {name:'Vulnerabilities', color:'#e0a458'},
        {name:'Exploitation', color:'#d9534f'},
        {name:'Post-Exploitation', color:'#a86ee0'},
        {name:'Credentials', color:'#e0c458'},
        {name:'Evidence', color:'#5cc98b'},
        {name:'Reporting', color:'#8492a6'},
      ]},
    { id:'bugbounty', name:'Bug Bounty Mode', builtIn:true,
      blurb:'Folders tuned for in-scope bug bounty hunting.',
      folders: [
        {name:'Scope & Program Rules', color:'#4c8bf5'},
        {name:'Recon', color:'#3fa796'},
        {name:'Asset & Subdomain Enum', color:'#5cc98b'},
        {name:'Vulnerabilities', color:'#e0a458'},
        {name:'Proof of Concept', color:'#d9534f'},
        {name:'Reports Submitted', color:'#a86ee0'},
        {name:'Triage & Payouts', color:'#e0c458'},
      ]},
    { id:'osint', name:'OSINT Mode', builtIn:true,
      blurb:'Folders for open-source intelligence gathering.',
      folders: [
        {name:'Target Profile', color:'#4c8bf5'},
        {name:'Social Media', color:'#3fa796'},
        {name:'Public Records', color:'#e0c458'},
        {name:'Infrastructure & DNS', color:'#5cc98b'},
        {name:'Leaks & Breach Data', color:'#d9534f'},
        {name:'Documentation', color:'#8492a6'},
      ]},
  ];

  let state = load();
  let currentFolderId = 'ALL';
  let currentNoteId = null;
  let previewMode = false;

  function defaultState(){
    return { activeModeId:'freedom', customModes:[], folders:[], notes:[] };
  }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return Object.assign(defaultState(), JSON.parse(raw));
    }catch(e){}
    // migrate from v3 (two-mode) format if present
    try{
      const legacy = localStorage.getItem(LEGACY_KEY);
      if(legacy){
        const old = JSON.parse(legacy);
        const migrated = defaultState();
        migrated.folders = (old.folders||[]).map(f=>({
          id: f.id, name: f.name, color: f.color,
          modeId: f.preset ? 'pentest' : 'freedom',
          preset: !!f.preset
        }));
        migrated.notes = old.notes || [];
        migrated.activeModeId = localStorage.getItem('arynotes_mode') || 'freedom';
        return migrated;
      }
    }catch(e){}
    return defaultState();
  }
  function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }
  function fmtDate(ts){
    if(!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }
  function folderById(id){ return state.folders.find(f=>f.id===id); }
  function nextColor(){
    const idx = state.folders.length % COLOR_PALETTE.length;
    return COLOR_PALETTE[idx];
  }

  // ---------- Theme ----------
  function applyTheme(t){
    document.body.setAttribute('data-theme', t);
    document.querySelectorAll('[data-theme-btn]').forEach(b=>{
      b.classList.toggle('active', b.dataset.themeBtn === t);
    });
    localStorage.setItem(THEME_KEY, t);
  }
  document.querySelectorAll('[data-theme-btn]').forEach(b=>{
    b.addEventListener('click', ()=> applyTheme(b.dataset.themeBtn));
  });
  applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

  // ---------- Modes ----------
  function allModes(){ return BUILT_IN_MODES.concat(state.customModes); }
  function modeById(id){ return allModes().find(m=>m.id===id); }
  function currentMode(){ return modeById(state.activeModeId) || BUILT_IN_MODES[0]; }

  function seedModeFolders(m){
    if(!m || !m.folders || !m.folders.length) return;
    m.folders.forEach(tf=>{
      const exists = state.folders.some(f => f.modeId===m.id && f.name.toLowerCase()===tf.name.toLowerCase());
      if(!exists){
        state.folders.push({id: uid('f'), name: tf.name, color: tf.color || nextColor(), modeId: m.id, preset:true});
      }
    });
  }

  function applyMode(id){
    const m = modeById(id) || BUILT_IN_MODES[0];
    state.activeModeId = m.id;
    seedModeFolders(m);
    persist();
    document.getElementById('modeTriggerLabel').textContent = m.name;
    document.getElementById('modeHint').textContent = m.blurb || '';
    currentFolderId = 'ALL';
    currentNoteId = null;
    renderModePanel();
    renderAll();
    clearEditor();
  }

  function visibleFolders(){
    return state.folders.filter(f => f.modeId === state.activeModeId);
  }

  // ---------- Mode picker UI ----------
  const modeTrigger = document.getElementById('modeTrigger');
  const modePanel = document.getElementById('modePanel');

  modeTrigger.addEventListener('click', (e)=>{
    e.stopPropagation();
    modePanel.classList.toggle('open');
  });
  document.addEventListener('click', (e)=>{
    if(!modePanel.contains(e.target) && e.target !== modeTrigger){
      modePanel.classList.remove('open');
    }
  });
  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape') modePanel.classList.remove('open');
  });

  function renderModePanel(){
    const list = document.getElementById('modeList');
    list.innerHTML = '';
    allModes().forEach(m=>{
      const count = state.folders.filter(f=>f.modeId===m.id).length;
      const el = document.createElement('div');
      el.className = 'mode-option' + (m.id===state.activeModeId ? ' active' : '');
      el.innerHTML = `
        <span class="m-dot" style="background:${m.builtIn ? 'var(--accent-2)' : 'var(--accent)'}"></span>
        <span class="m-info">
          <div class="m-name${m.id===state.activeModeId ? ' active-check':''}">${escapeHtml(m.name)}</div>
          <div class="m-blurb">${escapeHtml(m.blurb || '')} · ${count} folder${count===1?'':'s'}</div>
        </span>
        ${!m.builtIn ? '<button class="m-del" title="Delete custom mode">✕</button>' : ''}
      `;
      el.addEventListener('click', (e)=>{
        if(e.target.classList.contains('m-del')) return;
        applyMode(m.id);
        modePanel.classList.remove('open');
      });
      const delBtn = el.querySelector('.m-del');
      if(delBtn){
        delBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          deleteCustomMode(m.id);
        });
      }
      list.appendChild(el);
    });
  }

  function deleteCustomMode(id){
    const m = modeById(id);
    if(!m || m.builtIn) return;
    const folderCount = state.folders.filter(f=>f.modeId===id).length;
    if(!confirm(`Delete mode "${m.name}"? ${folderCount} folder(s) and all notes inside will also be deleted.`)) return;
    const folderIds = new Set(state.folders.filter(f=>f.modeId===id).map(f=>f.id));
    state.notes = state.notes.filter(n=>!folderIds.has(n.folderId));
    state.folders = state.folders.filter(f=>f.modeId!==id);
    state.customModes = state.customModes.filter(cm=>cm.id!==id);
    if(state.activeModeId === id){
      persist();
      applyMode('freedom');
    } else {
      persist();
      renderModePanel();
    }
  }

  document.getElementById('createModeBtn').addEventListener('click', ()=>{
    const name = prompt('Name your custom mode (e.g. "Red Team Ops", "CTF Notes"):');
    if(!name || !name.trim()) return;
    const startersRaw = prompt('Starter folders, comma separated (optional — leave blank for none):', '');
    const folders = (startersRaw||'').split(',').map(s=>s.trim()).filter(Boolean).map((n,i)=>({
      name:n, color: COLOR_PALETTE[i % COLOR_PALETTE.length]
    }));
    const m = { id: uid('m'), name: name.trim(), builtIn:false,
      blurb: 'Custom mode', folders };
    state.customModes.push(m);
    persist();
    applyMode(m.id);
    modePanel.classList.remove('open');
  });

  document.getElementById('importModeBtn').addEventListener('click', ()=>{
    document.getElementById('modeFileInput').click();
  });
  document.getElementById('modeFileInput').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data.name || !Array.isArray(data.folders)){
        alert('That file doesn\'t look like an AryNotes mode export.');
        return;
      }
      let name = data.name;
      const existingNames = allModes().map(m=>m.name.toLowerCase());
      if(existingNames.includes(name.toLowerCase())) name = name + ' (imported)';
      const m = { id: uid('m'), name, builtIn:false,
        blurb: data.blurb || 'Imported mode',
        folders: data.folders.map(f=>({name:f.name, color:f.color || nextColor()})) };
      state.customModes.push(m);
      persist();
      applyMode(m.id);
      modePanel.classList.remove('open');
    }catch(err){
      alert('Could not import mode: ' + err.message);
    }
  });

  document.getElementById('exportModeBtn').addEventListener('click', ()=>{
    const m = currentMode();
    const folders = visibleFolders().map(f=>({name:f.name, color:f.color}));
    const payload = JSON.stringify({ type:'arynotes-mode', name:m.name, blurb:m.blurb, folders }, null, 2);
    downloadFile('arynotes-mode-' + slug(m.name) + '.json', payload, 'application/json');
    modePanel.classList.remove('open');
  });

  // ---------- Rendering: folders ----------
  function renderFolders(){
    const list = document.getElementById('folderList');
    list.innerHTML = '';
    const folders = visibleFolders();
    if(folders.length === 0){
      list.innerHTML = `<div class="empty-hint">No folders yet.<br>Tap ＋ to create one, or pick a mode with a ready-made set.</div>`;
    }
    folders.forEach(f=>{
      const count = state.notes.filter(n=>n.folderId===f.id).length;
      const el = document.createElement('div');
      el.className = 'folder-item' + (currentFolderId===f.id ? ' active':'');
      el.innerHTML = `
        <span class="folder-dot" style="background:${f.color}"></span>
        <span class="folder-name">${escapeHtml(f.name)}</span>
        ${f.preset ? '<span class="folder-tag">preset</span>' : ''}
        <span class="folder-count">${count}</span>
        <button class="del-folder" title="Delete folder">✕</button>
      `;
      el.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del-folder')) return;
        currentFolderId = f.id;
        renderAll();
      });
      el.querySelector('.del-folder').addEventListener('click', (e)=>{
        e.stopPropagation();
        deleteFolder(f.id);
      });
      list.appendChild(el);
    });

    document.getElementById('allNotesBtn').classList.toggle('active', currentFolderId==='ALL');

    const sel = document.getElementById('folderSelect');
    if(folders.length === 0){
      sel.innerHTML = `<option value="" disabled selected>No folders — create one first</option>`;
    } else {
      sel.innerHTML = folders.map(f=>`<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('');
    }
  }

  document.getElementById('allNotesBtn').addEventListener('click', ()=>{
    currentFolderId = 'ALL';
    renderAll();
  });

  document.getElementById('addFolderBtn').addEventListener('click', ()=>{
    const name = prompt('New folder name (e.g. "Client X — Web App" or "Chapter 3 Notes"):');
    if(!name || !name.trim()) return;
    const f = {id: uid('f'), name: name.trim(), color: nextColor(), modeId: state.activeModeId, preset:false};
    state.folders.push(f);
    currentFolderId = f.id;
    persist();
    renderAll();
  });

  function deleteFolder(id){
    const f = folderById(id);
    if(!f) return;
    const count = state.notes.filter(n=>n.folderId===id).length;
    if(!confirm(`Delete folder "${f.name}"? ${count} note(s) inside will also be deleted.`)) return;
    state.notes = state.notes.filter(n=>n.folderId!==id);
    state.folders = state.folders.filter(x=>x.id!==id);
    if(currentFolderId===id) currentFolderId = 'ALL';
    if(currentNoteId && !state.notes.find(n=>n.id===currentNoteId)) clearEditor();
    persist();
    renderAll();
  }

  // ---------- Rendering: notes list ----------
  function visibleNotes(){
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    let notes = state.notes.slice();
    if(currentFolderId !== 'ALL') notes = notes.filter(n=>n.folderId===currentFolderId);
    else {
      const allowedIds = new Set(visibleFolders().map(f=>f.id));
      notes = notes.filter(n=>allowedIds.has(n.folderId));
    }
    if(q){
      notes = notes.filter(n =>
        (n.title||'').toLowerCase().includes(q) ||
        (n.content||'').toLowerCase().includes(q) ||
        (n.tags||[]).join(',').toLowerCase().includes(q)
      );
    }
    return notes.sort((a,b)=> (b.updatedAt||0) - (a.updatedAt||0));
  }

  function renderNotes(){
    const wrap = document.getElementById('notesScroll');
    const notes = visibleNotes();
    wrap.innerHTML = '';
    if(notes.length === 0){
      wrap.innerHTML = `<div class="empty-hint">No notes here yet.<br>Click "＋ New" to start writing.</div>`;
      return;
    }
    notes.forEach(n=>{
      const f = folderById(n.folderId);
      const card = document.createElement('div');
      card.className = 'note-card' + (n.id===currentNoteId ? ' active':'');
      card.style.borderLeftColor = f ? f.color : 'var(--accent-2)';
      card.innerHTML = `
        <div class="n-title">${escapeHtml(n.title || 'Untitled')}</div>
        <div class="n-meta"><span>${f ? escapeHtml(f.name) : '—'}</span><span>${fmtDate(n.updatedAt)}</span></div>
        <div class="n-preview">${escapeHtml((n.content||'').replace(/!\[.*?\]\(.*?\)/g,'[image] ').slice(0,80).replace(/\n/g,' '))}</div>
      `;
      card.addEventListener('click', ()=> openNote(n.id));
      wrap.appendChild(card);
    });
  }

  // ---------- Editor ----------
  function clearEditor(){
    currentNoteId = null;
    document.getElementById('title').value = '';
    document.getElementById('tags').value = '';
    document.getElementById('note').value = '';
    document.getElementById('metaLine').textContent = 'New note — not yet saved';
    const folders = visibleFolders();
    const sel = document.getElementById('folderSelect');
    if(folders.length){
      sel.value = currentFolderId !== 'ALL' && folders.find(f=>f.id===currentFolderId) ? currentFolderId : folders[0].id;
    }
    document.getElementById('deleteBtn').disabled = true;
    setPreview(false);
    updateLineNumbers();
  }

  function openNote(id){
    const n = state.notes.find(x=>x.id===id);
    if(!n) return;
    currentNoteId = id;
    document.getElementById('title').value = n.title || '';
    document.getElementById('tags').value = (n.tags||[]).join(', ');
    document.getElementById('note').value = n.content || '';
    const sel = document.getElementById('folderSelect');
    if([...sel.options].some(o=>o.value===n.folderId)) sel.value = n.folderId;
    document.getElementById('metaLine').textContent =
      `Created ${fmtDate(n.createdAt)} · Updated ${fmtDate(n.updatedAt)}`;
    document.getElementById('deleteBtn').disabled = false;
    renderNotes();
    setPreview(false);
    updateLineNumbers();
  }

  document.getElementById('newBtn').addEventListener('click', clearEditor);

  document.getElementById('saveBtn').addEventListener('click', ()=>{
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('note').value;
    const tags = document.getElementById('tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const folders = visibleFolders();
    const folderId = document.getElementById('folderSelect').value || (folders[0] && folders[0].id);
    if(!title){ alert('Give the note a title before saving.'); return; }
    if(!folderId){ alert('Create a folder first (tap ＋ in the sidebar).'); return; }
    const now = Date.now();
    if(currentNoteId){
      const n = state.notes.find(x=>x.id===currentNoteId);
      Object.assign(n, {title, content, tags, folderId, updatedAt: now});
    } else {
      const n = {id: uid('n'), title, content, tags, folderId, createdAt: now, updatedAt: now};
      state.notes.push(n);
      currentNoteId = n.id;
    }
    persist();
    renderAll();
    openNote(currentNoteId);
  });

  document.getElementById('deleteBtn').addEventListener('click', ()=>{
    if(!currentNoteId) return;
    if(!confirm('Delete this note? This cannot be undone.')) return;
    state.notes = state.notes.filter(n=>n.id!==currentNoteId);
    persist();
    clearEditor();
    renderAll();
  });

  document.getElementById('downloadBtn').addEventListener('click', ()=>{
    const title = document.getElementById('title').value.trim() || 'untitled-note';
    const tags = document.getElementById('tags').value.trim();
    const content = document.getElementById('note').value;
    const folder = folderById(document.getElementById('folderSelect').value);
    const body =
`Title: ${title}
Folder: ${folder ? folder.name : ''}
Tags: ${tags}
Exported: ${new Date().toLocaleString()}
----------------------------------------

${content}
`;
    downloadFile(sanitizeFilename(title) + '.txt', body);
  });

  document.getElementById('searchBox').addEventListener('input', renderNotes);

  // ---------- Write / Preview tabs ----------
  function setPreview(on){
    previewMode = on;
    document.getElementById('writeTab').classList.toggle('active', !on);
    document.getElementById('previewTab').classList.toggle('active', on);
    document.getElementById('editorPane').style.display = on ? 'none' : 'flex';
    document.getElementById('previewPane').classList.toggle('show', on);
    if(on) renderPreview();
  }
  document.getElementById('writeTab').addEventListener('click', ()=> setPreview(false));
  document.getElementById('previewTab').addEventListener('click', ()=> setPreview(true));

  function mdToHtml(src){
    let html = escapeHtml(src);
    html = html.replace(/!\[([^\]]*)\]\((data:[^)]+|https?:[^)]+)\)/g, (m, alt, url)=>{
      return `<img src="${url}" alt="${alt}">`;
    });
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    html = html.split(/\n{2,}/).map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    return html;
  }
  function renderPreview(){
    const raw = document.getElementById('note').value;
    document.getElementById('preview').innerHTML = mdToHtml(raw || '*Nothing to preview yet.*');
    updatePreviewGutter(raw);
  }

  // ---------- Line numbers ----------
  const lineGutter = document.getElementById('lineGutter');
  const previewGutter = document.getElementById('previewGutter');

  function numbersHtml(count){
    let out = '';
    for(let i = 1; i <= count; i++) out += `<div>${i}</div>`;
    return out;
  }
  function updateLineNumbers(){
    const lines = (document.getElementById('note').value.match(/\n/g) || []).length + 1;
    lineGutter.innerHTML = numbersHtml(lines);
  }
  function updatePreviewGutter(raw){
    const lines = ((raw||'').match(/\n/g) || []).length + 1;
    previewGutter.innerHTML = numbersHtml(lines);
  }

  const noteEl = document.getElementById('note');
  noteEl.addEventListener('input', updateLineNumbers);
  noteEl.addEventListener('scroll', ()=>{ lineGutter.scrollTop = noteEl.scrollTop; });
  document.getElementById('preview').addEventListener('scroll', function(){
    previewGutter.scrollTop = this.scrollTop;
  });

  // ---------- Drag & drop images into note ----------
  const dropHint = document.getElementById('dropHint');
  const editorPane = document.getElementById('editorPane');
  let dragCounter = 0;

  noteEl.addEventListener('dragenter', (e)=>{
    e.preventDefault();
    if(Array.from(e.dataTransfer.items||[]).some(it=>it.kind==='file')){
      dragCounter++;
      editorPane.classList.add('dragging');
      dropHint.classList.add('show');
    }
  });
  noteEl.addEventListener('dragover', (e)=> e.preventDefault());
  noteEl.addEventListener('dragleave', ()=>{
    dragCounter = Math.max(0, dragCounter - 1);
    if(dragCounter === 0){
      editorPane.classList.remove('dragging');
      dropHint.classList.remove('show');
    }
  });
  noteEl.addEventListener('drop', (e)=>{
    e.preventDefault();
    dragCounter = 0;
    editorPane.classList.remove('dragging');
    dropHint.classList.remove('show');
    const files = Array.from(e.dataTransfer.files || []).filter(f=>f.type.startsWith('image/'));
    if(!files.length) return;
    const cursorPos = noteEl.selectionStart;
    files.forEach(file=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const tag = `![${file.name}](${reader.result})\n`;
        const val = noteEl.value;
        noteEl.value = val.slice(0, cursorPos) + tag + val.slice(cursorPos);
        updateLineNumbers();
      };
      reader.readAsDataURL(file);
    });
  });

  // ---------- Export all / Import notes ----------
  document.getElementById('exportAllBtn').addEventListener('click', ()=>{
    const payload = JSON.stringify(state, null, 2);
    downloadFile('arynotes-backup-' + dateStamp() + '.json', payload, 'application/json');
  });

  document.getElementById('importBtn').addEventListener('click', ()=>{
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', async (e)=>{
    const files = Array.from(e.target.files || []);
    for(const file of files){
      const text = await file.text();
      if(file.name.toLowerCase().endsWith('.json')){
        importWorkspaceJson(text);
      } else {
        importTxt(file.name, text);
      }
    }
    e.target.value = '';
    persist();
    renderModePanel();
    renderAll();
  });

  function importWorkspaceJson(text){
    try{
      const data = JSON.parse(text);
      if(!Array.isArray(data.folders) || !Array.isArray(data.notes)){
        alert('That JSON file doesn\'t look like an AryNotes backup.');
        return;
      }
      // bring in any custom modes referenced in the backup
      (data.customModes || []).forEach(cm=>{
        if(!state.customModes.find(x=>x.id===cm.id) && !BUILT_IN_MODES.find(x=>x.id===cm.id)){
          state.customModes.push(cm);
        }
      });
      // register a fallback custom mode for any orphan modeId we don't recognize
      const knownIds = new Set(allModes().map(m=>m.id));
      const orphanIds = new Set();
      data.folders.forEach(f=>{ if(f.modeId && !knownIds.has(f.modeId)) orphanIds.add(f.modeId); });
      orphanIds.forEach(oid=>{
        state.customModes.push({id:oid, name:'Imported (' + oid + ')', builtIn:false, blurb:'Recovered from import', folders:[]});
      });
      data.folders.forEach(f=>{
        if(!state.folders.find(x=>x.id===f.id)) state.folders.push(f);
      });
      data.notes.forEach(n=>{
        const newId = uid('n');
        state.notes.push(Object.assign({}, n, {id:newId}));
      });
    }catch(err){
      alert('Could not parse JSON file: ' + err.message);
    }
  }

  function importTxt(filename, text){
    const folders = visibleFolders();
    const folderId = currentFolderId !== 'ALL' ? currentFolderId : (folders[0] ? folders[0].id : null);
    if(!folderId){ alert('Create a folder before importing text files.'); return; }
    const now = Date.now();
    const title = filename.replace(/\.(txt|md)$/i,'');
    state.notes.push({
      id: uid('n'), title, content: text, tags: ['imported'],
      folderId, createdAt: now, updatedAt: now
    });
  }

  // ---------- Helpers ----------
  function downloadFile(filename, content, mime){
    const blob = new Blob([content], {type: mime || 'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function sanitizeFilename(s){ return s.replace(/[^a-z0-9\-_]+/gi,'_').slice(0,60) || 'note'; }
  function dateStamp(){
    const d = new Date();
    return d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0');
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderAll(){
    renderFolders();
    renderNotes();
  }

  // init
  applyMode(state.activeModeId || 'freedom');
})();
</script>
</body>
</html>
